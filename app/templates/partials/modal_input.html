<div class="modal" data-modal="{{ modal_name }}" hidden>
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-dialog">
    <div class="panel">
      <div class="panel-header">
        <h2>{{ modal_title }}</h2>
      </div>

      <form method="post" action="{{ form_action }}">
        {% for hidden_name, hidden_value in hidden_fields.items() %}
        <input type="hidden" name="{{ hidden_name }}" value="{{ hidden_value }}" />
        {% endfor %}

        <label class="modal-label" for="{{ input_id }}">{{ input_label }}</label>
        <input id="{{ input_id }}" class="text-input" type="{{ input_type }}" name="{{ input_name }}" value="{{ input_value }}" placeholder="{{ input_placeholder }}" maxlength="120" {% if input_required %}required{% endif %} />

        <div class="modal-actions">
          <button class="action-button" type="submit">{{ submit_label }}</button>
          <button class="action-button" type="button" data-modal-close>Annuler</button>
        </div>
      </form>
    </div>
  </div>
</div>
