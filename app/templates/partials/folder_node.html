<li class="tree-node">
  <div class="tree-folder-row">
    <button class="tree-toggle" type="button" data-folder-toggle data-folder-id="{{ tree.id }}" aria-expanded="true">[-]</button>
    <span class="tree-folder-glyph"><i class="fas fa-folder"></i></span>
    <a class="tree-folder-link" href="{{ url_for('pages.index', folder_id=tree.id) }}">{{ tree.name }}</a>
    <button class="tree-row-menu" type="button" aria-label="Options">⋮</button>
  </div>

  {% if tree.folders %}
  <ul class="tree-list tree-list-nested" data-folder-children="{{ tree.id }}">
    {% for child in tree.folders %} {% set tree = child %} {% include 'partials/folder_node.html' %} {% endfor %}
  </ul>
  {% endif %} {% if tree.notes %}
  <ul class="tree-notes" data-folder-notes="{{ tree.id }}">
    {% for note in tree.notes %}
    <li class="tree-note-row">
      <span class="tree-note-glyph"><i class="fas fa-file"></i></span>
      <a class="tree-note-link" href="{{ url_for('pages.index', note_id=note.id) }}">{{ note.name }}</a>
      <button class="tree-row-menu" type="button" aria-label="Options">⋮</button>
    </li>

    {% endfor %}
  </ul>
  {% endif %}
</li>
